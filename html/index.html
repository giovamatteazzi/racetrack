<!DOCTYPE html>

<html lang="it">

<head>

    <title>RaceTrack</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--favicon-->
    <link rel="stylesheet" href="../css/style.css">

    <script type="module" src="../js/main.js"> </script>

</head>

<body>

    <header>
        <div id="titolo">
            <h1>RaceTrack</h1>
            <button class="pulsante-primario" onclick="window.location.href='guida.html'">Guida</button>
        </div>
        <div id="utente-sessione">
            <p>Ospite</p>
        </div>
    </header>


    <aside id="pannello-sinistro">
        <div class="form-primario">
            <h2>Registrati</h2>
            <form> <!--\it="authContext.handleSignup(event)"-->
                <div class="form-gruppo">
                    <label for="nome-utente-registrazione">Nome utente</label>
                    <input type="text" id="nome-utente-registrazione" pattern="^[A-Za-z0-9]{3,15}$" required>
                </div>
                <div class="form-gruppo">
                    <label for="password-registrazione">Password</label>
                    <input type="password" id="password-registrazione"
                        pattern="^(?=.*\d)(?=.*[!#$%&*^_\-~])[A-Za-z\d!#$%&*^_\-~]{6,30}$" required>
                </div>
                <button type="submit" class="pulsante-primario">Registrati</button>
                <p>Già registrato?<!--<a href="#" onclick="userDashboard.showLoginForm()">Accedi</a>--></p>
            </form>
        </div>


        <div class="form-primario nascosto">
            <h2>Accedi</h2>
            <form><!-- onsubmit="authContext.handleLogin(event)"-->
                <div class="form-gruppo">
                    <label for="nome-utente-accesso">Nome utente</label>
                    <input type="text" id="nome-utente-accesso" required>
                </div>
                <div class="form-gruppo">
                    <label for="password-accesso">Password</label>
                    <input type="password" id="password-accesso" required>
                </div>
                <button type="submit" class="pulsante-secondario">Accedi</button>
                <p>Non registrato? <!--<a href="#" onclick="userDashboard.showSignUpForm()">Registrati</a>-->
                </p>
            </form>
        </div>
    </aside>


    <div id="schermata-iniziale">
        <form id="inizia-partita" novalidate>

            <select id="seleziona-pista" required>
                <option value="" selected>Pista</option>
                <option value="pista1">Pista 1</option>
                <option value="pista2">Pista 2</option>
            </select>

            <div id="campi">
                <input type="text" class="giocatore" id="giocatore-A" placeholder="Giocatore 1"
                    pattern="^[A-Za-z0-9\s]{3,10}$" required>
                <input type="text" class="giocatore" id="giocatore-B" placeholder="Giocatore 2"
                    pattern="^[A-Za-z0-9\s]{3,10}$" required>
            </div>

            <button type="submit" class="pulsante-secondario">Gioca</button>
        </form>
    </div>


    <main id="schermata-partita" class="nascosto">
        <div id="canvas-container">
            <canvas id="canva"></canvas>
        </div>

        <aside id="pannello-destro">
            <button id="ricomincia-partita" class="pulsante-primario">Ricomincia partita</button>

            <div id="turno-container">
                <b>Turno:</b>
                <div id="turno"></div>
            </div>

            <div id="mosse-container">
                <b>Mosse:</b>
                <p id="mosse"></p>
            </div>


            <div id="legenda">
                <span id="mostra-legenda">Legenda</span>
                <div id="contenuto-legenda">
                    <div class="punto-legenda">
                        <div class="quadrato verde-scuro"></div>
                        <p class="testo-legenda">Punto principale</p>
                    </div>
                    <div class="punto-legenda">
                        <div class="quadratino verde"></div>
                        <p class="testo-legenda">Punti validi</p>
                    </div>
                    <div class="punto-legenda">
                        <div class="quadratino rosso-scuro"></div>
                        <p class="testo-legenda">Fuori pista</p>
                    </div>
                    <div class="punto-legenda">
                        <div class="cerchio arancione"></div>
                        <p class="testo-legenda">Incidente</p>
                    </div>
                    <div class="punto-legenda">
                        <div class="cerchio bianco"></div>
                        <p class="testo-legenda">Stop</p>
                    </div>
                </div>
            </div>
        </aside>

    </main>

    <div id="fine-partita" class="nascosto"> </div>

</body>

</html>
